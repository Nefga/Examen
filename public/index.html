<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoreo y Control del Ecosistema</title>
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
  <script defer src="index.js"></script>
</head>
<body>
  <main class="contenedor">
    <header>
      <div>
        <p class="eyebrow">Instrumentación Virtual</p>
        <h1>Monitoreo y control del ecosistema</h1>
      </div>
      <span id="conexion" class="estado desconectado">Desconectado</span>
    </header>

    <section class="panel principal">
      <div class="medidor">
        <div class="barra-fondo">
          <div id="barraLuz" class="barra-luz"></div>
          <div class="linea-umbral" title="Umbral: 15 lux"></div>
        </div>
        <strong id="valorLux">0.0 lux</strong>
        <small>Umbral de alarma: 15 lux</small>
      </div>

      <div class="metricas">
        <article><span>LDR</span><strong id="ldr">0.0 lux</strong></article>
        <article><span>ADC</span><strong id="adc">0</strong></article>
        <article><span>Buzzer</span><strong id="buzzer">APAGADO</strong></article>
        <article><span>LED</span><strong id="led">APAGADO</strong></article>
        <article><span>Modo</span><strong id="modo">AUTO</strong></article>
        <article><span>Última lectura</span><strong id="hora">--:--:--</strong></article>
      </div>
    </section>

    <section class="panel controles">
      <h2>Control de actuadores</h2>
      <div class="botones">
        <button class="encender" onclick="enviarComando('BUZZER_ON')">Activar alarma</button>
        <button class="apagar" onclick="enviarComando('BUZZER_OFF')">Desactivar alarma</button>
        <button class="auto" onclick="enviarComando('AUTO')">Modo automático</button>
      </div>
      <div class="comando-libre">
        <input id="txtComando" placeholder="BUZZER_ON, BUZZER_OFF o AUTO">
        <button onclick="enviarComandoLibre()">Enviar</button>
      </div>
    </section>

    <section class="panel">
      <h2>Historial</h2>
      <pre id="log"></pre>
    </section>
  </main>
</body>
</html>
