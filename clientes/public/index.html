<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ecosistema — Panel de Monitoreo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="socket.io/socket.io.js"></script>
    <script type="text/javascript" src="index.js" defer></script>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <div class="panel">
        <span class="eyebrow">Instrumentación Virtual</span>
        <h2>Ecosistema</h2>
        <p style="color: var(--text-muted); margin: 0; font-size: 0.9rem;">
            Monitoreo y control del sensor de luz (LDR)
        </p>

        <div class="layout">
            <!-- Medidor de luz: elemento central -->
            <div class="medidor-wrap">
                <div class="medidor-track">
                    <div class="medidor-fill" id="medidor_fill"></div>
                    <div class="medidor-umbral" id="medidor_umbral"></div>
                    <div class="medidor-marcador" id="medidor_marcador"></div>
                </div>
                <div class="medidor-valor" id="div_ldr_valor">--</div>
                <div class="medidor-label">Nivel de luz (lux)</div>
            </div>

            <div>
                <div class="estado-fila">
                    <span class="pill desconectado" id="pill_conexion">● Desconectado</span>
                </div>

                <div class="metrica">
                    <span class="nombre">Buzzer</span>
                    <span class="dato off" id="div_buzzer">APAGADO</span>
                </div>
                <div class="metrica">
                    <span class="nombre">LED</span>
                    <span class="dato off" id="div_led">APAGADO</span>
                </div>
                <div class="metrica">
                    <span class="nombre">Umbral de alarma</span>
                    <span class="dato">&lt; 15 lux</span>
                </div>

                <div class="controles">
                    <input type="button" class="button button1 encender" value="Activar alarma" onclick="encender()">
                    <input type="button" class="button button1 apagar" value="Desactivar alarma" onclick="apagar()">
                    <input type="button" class="button" value="↺ Modo automático" onclick="reiniciarAuto()">
                </div>

                <div class="comando-fila">
                    <input type="text" id="txt_comando" placeholder="comando personalizado...">
                    <input type="button" class="button" value="Enviar" onclick="enviar_comando()">
                </div>
            </div>
        </div>

        <div class="bitacora-titulo">Bitácora de eventos</div>
        <div id="div_log"></div>
    </div>
</body>

</html>
